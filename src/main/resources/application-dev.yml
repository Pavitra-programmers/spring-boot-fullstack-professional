# application-dev.yml — Development / Supabase environment overrides
# Activate with: --spring.profiles.active=dev
spring:
  datasource:
    # Use Supabase connection pooler (port 6543) — see TICKET LF-205 notes in README
    url: ${SUPABASE_DB_URL:jdbc:postgresql://db.YOURPROJECT.supabase.co:6543/postgres?pgbouncer=true}
    username: ${SUPABASE_DB_USERNAME:postgres}
    password: ${SUPABASE_DB_PASSWORD:your-supabase-password}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
